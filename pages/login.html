<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — MediQueue</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/output.css" />
</head>
<body class="min-h-screen bg-gradient-to-br from-slate-50 via-teal-50/30 to-blue-50/20 font-body antialiased">
  
  <!-- Header -->
  <header class="glass-white border-b border-slate-200/50">
    <div class="max-w-7xl mx-auto px-6 py-4">
      <div class="flex items-center justify-between">
        <a href="../index.html" class="flex items-center gap-3 hover:opacity-80 transition-opacity cursor-pointer">
          <div class="flex h-11 w-11 items-center justify-center rounded-xl bg-gradient-to-br from-teal-400 to-teal-600 font-display text-lg font-bold text-white shadow-soft">M</div>
          <span class="font-display text-xl font-bold text-navy-900">MediQueue</span>
        </a>
      </div>
    </div>
  </header>

  <!-- Main Content -->
  <div class="flex items-center justify-center min-h-[calc(100vh-80px)] px-6 py-12">
    <div class="w-full max-w-md">
      <!-- Login Card -->
      <div class="card-glass p-8">
        <div class="text-center mb-8">
          <h1 class="font-display text-3xl font-bold text-navy-900 mb-2">Welcome Back</h1>
          <p class="text-slate-600">Sign in to access your dashboard</p>
        </div>

        <!-- Login Form -->
        <form id="login-form" class="space-y-6">
          <!-- Email -->
          <div>
            <label class="block text-sm font-semibold text-navy-900 mb-2">Email Address</label>
            <input 
              type="email" 
              id="email" 
              required
              placeholder="your@email.com"
              class="w-full px-4 py-3 rounded-lg border border-slate-200 focus:border-teal-500 focus:ring-2 focus:ring-teal-200 outline-none transition"
            />
          </div>

          <!-- Password -->
          <div>
            <label class="block text-sm font-semibold text-navy-900 mb-2">Password</label>
            <div class="relative">
              <input 
                type="password" 
                id="password" 
                required
                placeholder="••••••••"
                class="w-full px-4 py-3 pr-12 rounded-lg border border-slate-200 focus:border-teal-500 focus:ring-2 focus:ring-teal-200 outline-none transition"
              />
              <button 
                type="button" 
                id="toggle-password"
                class="absolute right-3 top-1/2 -translate-y-1/2 p-2 text-slate-400 hover:text-slate-600 transition-colors rounded-lg hover:bg-slate-100"
                aria-label="Toggle password visibility"
              >
                <!-- Eye Icon (Show) -->
                <svg id="eye-icon" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                </svg>
                <!-- Eye Slash Icon (Hide) -->
                <svg id="eye-slash-icon" class="w-5 h-5 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21" />
                </svg>
              </button>
            </div>
          </div>

          <!-- Remember & Forgot -->
          <div class="flex items-center justify-between">
            <label class="flex items-center gap-2">
              <input type="checkbox" id="remember" class="w-4 h-4 text-teal-600 rounded">
              <span class="text-sm text-slate-600">Remember me</span>
            </label>
            <a href="#" class="text-sm text-teal-600 hover:text-teal-700 font-semibold">Forgot password?</a>
          </div>

          <!-- Submit Button -->
          <button type="submit" id="login-btn" class="btn-primary w-full">
            Sign In
          </button>
        </form>


        <!-- Register Link -->
        <p class="text-center text-sm text-slate-600 mt-6">
          Don't have an account? 
          <a href="./register.html" class="text-teal-600 hover:text-teal-700 font-semibold">Sign up</a>
        </p>
      </div>
    </div>
  </div>

  <script type="module" src="../js/pages/login.js"></script>
</body>
</html>
