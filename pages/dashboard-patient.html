<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Patient Dashboard — MediQueue</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/output.css" />
</head>
<body class="min-h-screen bg-paper font-body">
  <header id="navbar" class="flex items-center justify-between border-b border-slate-100 bg-white px-6 py-4 sticky top-0 z-50 transition-transform duration-300">
    <a href="../index.html" class="flex items-center gap-2.5 hover:opacity-80 transition-opacity cursor-pointer">
      <div class="flex h-8 w-8 items-center justify-center rounded-md bg-teal-500 font-display text-sm font-bold text-navy-950">M</div>
      <span class="font-display text-lg font-semibold text-navy-900">MediQueue</span>
    </a>
    <button id="logout-btn" class="btn-secondary">Sign out</button>
  </header>

  <main class="mx-auto max-w-5xl px-6 py-10">
    <h1 class="font-display text-2xl font-semibold text-navy-900">Your appointments</h1>
    <p class="mt-1 text-sm text-slate-500">Manage your appointments and track queue status</p>

    <div class="flex gap-4 mt-6">
      <a href="./book-appointment.html" class="btn-primary inline-flex">
        <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
        </svg>
        Book New Appointment
      </a>
      <a href="./queue-status.html" class="btn-secondary inline-flex">
        <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
        </svg>
        View Queue Status
        <span class="ml-2 relative flex h-2 w-2">
          <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span>
          <span class="relative inline-flex rounded-full h-2 w-2 bg-green-500"></span>
        </span>
      </a>
    </div>

    <div id="appointments-list" class="mt-10 rounded-lg border border-slate-100 bg-white p-6 text-sm text-slate-500">
      No appointments loaded yet — this panel will pull from the <code class="font-mono text-xs text-navy-800">appointments</code> table, filtered to the signed-in patient.
    </div>
  </main>

  <script type="module">
    import { getCurrentProfile, signOut } from "../js/auth.js";

    // Simple route guard — redirect to login if not authenticated.
    const profile = await getCurrentProfile().catch(() => null);
    if (!profile) window.location.href = "../index.html";

    document.getElementById("logout-btn").addEventListener("click", async () => {
      await signOut();
      window.location.href = "../index.html";
    });
    
    // Smart navbar scroll behavior
    const navbar = document.getElementById('navbar');
    let lastScrollY = window.scrollY;
    let ticking = false;
    
    const updateNavbar = () => {
      const currentScrollY = window.scrollY;
      
      if (currentScrollY > 100) {
        if (currentScrollY > lastScrollY) {
          navbar.style.transform = 'translateY(-100%)';
        } else {
          navbar.style.transform = 'translateY(0)';
        }
      } else {
        navbar.style.transform = 'translateY(0)';
      }
      
      lastScrollY = currentScrollY;
      ticking = false;
    };
    
    const requestTick = () => {
      if (!ticking) {
        requestAnimationFrame(updateNavbar);
        ticking = true;
      }
    };
    
    window.addEventListener('scroll', requestTick, { passive: true });
  </script>
</body>
</html>
